<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/Array-Method/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="contain">
        <input
          type="text"
          name=""
          id="txt-name"
          placeholder="Enter Staff Name"
        />
        <input
          type="number"
          name=""
          id="txt-phone"
          placeholder="Enter Staff Phone"
        />
        <input
          type="number"
          name=""
          id="txt-age"
          placeholder="Enter Staff Age"
        />
        <input
          type="text"
          name=""
          id="txt-gender"
          placeholder="Enter Staff Gender"
        />
        <button type="button" id="btn-add">Add Staff</button>
      </div>
      <div class="staff-information">
        <h1>Staff Information</h1>
        <!-- Staff information will be displayed here -->
        <div class="information">
          <!-- staff information will be displayed here -->
          <table border="1" width="100%">
          <thead>
            <tr>
              <th width="5%">ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Age</th>
              <th>Gender</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
          </thead>

          <tbody class="show-information">

          </tbody>
        </table>
      </div>
    </div>
  </body>
  <script src="/Array-Method/script.js"></script>
</html>
